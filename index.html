<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aplikasi GIS Mini</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    html, body {
      height: 100%;
      margin: 0;
      font-family: Arial, sans-serif;
    }
    body {
      display: flex;
    }
    #sidebar {
      width: 320px;
      background: #f4f5f7;
      padding: 20px;
      box-shadow: 2px 0 5px rgba(0,0,0,0.1);
      z-index: 1000;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    #map {
      flex: 1;
      min-height: 100vh;
    }
    .btn {
      background-color: #0079c1;
      color: white;
      border: none;
      padding: 10px 15px;
      font-size: 14px;
      cursor: pointer;
      border-radius: 4px;
      font-weight: bold;
      transition: background 0.2s;
    }
    .btn:hover {
      background-color: #005e96;
    }
    .info-box {
      background: white;
      padding: 10px;
      border-radius: 4px;
      border: 1px solid #ccc;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div id="sidebar">
    <h3>Portal Geo-Mini</h3>
    <p>Aplikasi ini mendemonstrasikan fungsi <i>streaming layer</i> dan ekstraksi data spasial dari server ArcGIS REST API.</p>

    <div class="info-box">
      <strong>Status Layer Aktif:</strong>
      <div id="layer-status">Memuat data batas wilayah...</div>
    </div>

    <button class="btn" id="download-btn">Unduh Data (GeoJSON)</button>
  </div>

  <div id="map"></div>

  <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/esri-leaflet@3.0.12/dist/esri-leaflet.js"></script>
  <script>
    const map = L.map('map').setView([39.5, -98.35], 4);

    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    const featureServiceUrl = 'https://services.arcgis.com/P3ePLMYs2RVChkJx/ArcGIS/rest/services/USA_States_Generalized/FeatureServer/0';

    const statesLayer = L.esri.featureLayer({
      url: featureServiceUrl,
      style: function () {
        return {
          color: '#0079c1',
          weight: 2,
          fillOpacity: 0.3
        };
      }
    }).addTo(map);

    statesLayer.on('load', function () {
      document.getElementById('layer-status').textContent = 'Layer berhasil dimuat';
    });

    document.getElementById('download-btn').addEventListener('click', async () => {
      const statusEl = document.getElementById('layer-status');
      const queryUrl = featureServiceUrl + '/query?where=1%3D1&outFields=*&f=geojson';

      try {
        statusEl.textContent = 'Mengunduh data...';
        const response = await fetch(queryUrl);
        if (!response.ok) throw new Error('Gagal mengambil data');
        const geojson = await response.json();

        const blob = new Blob([JSON.stringify(geojson, null, 2)], { type: 'application/json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'data.geojson';
        a.click();
        URL.revokeObjectURL(a.href);
        statusEl.textContent = 'Unduhan selesai';
      } catch (error) {
        console.error(error);
        statusEl.textContent = 'Gagal mengunduh data';
      }
    });
  </script>
</body>
</html>
