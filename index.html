<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>WEBGIS</title>

https://unpkg.com/leaflet@1.9.4/dist/leaflet.css

<style>
html,body,#map{
height:100%;
margin:0;
}
</style>
</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leafleteaflet.js

<script>

var map = L.map('map').setView([-2.5,121.3],6);

L.tileLayer(
'https://tile.openstreetmap.org/{z}/{x}/{y}.png',
{
attribution:'© OpenStreetMap'
}
).addTo(map);

var wms = L.tileLayer.wms(
'https://ahocevar.com/geoserver/wms',
{
layers:'topp:states',
format:'image/png',
transparent:true
}
);

wms.addTo(map);

</script>

</body>
</html>
