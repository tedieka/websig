<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Portal Geo-Mini</title>

https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css

<style>

body{
    font-family:Arial,sans-serif;
    margin:0;
    padding:0;
    display:flex;
    height:100vh;
}

#sidebar{
    width:320px;
    background:#f4f5f7;
    padding:20px;
    box-shadow:2px 0 5px rgba(0,0,0,0.1);
    z-index:1000;
    display:flex;
    flex-direction:column;
    gap:15px;
}

#map-container{
    flex:1;
    position:relative;
}

#map{
    width:100%;
    height:100%;
}

#searchBox{
    position:absolute;
    top:10px;
    right:15px;
    z-index:2000;
    background:white;
    padding:8px;
    border-radius:6px;
    box-shadow:0 0 8px rgba(0,0,0,.3);
    display:flex;
    gap:5px;
}

#searchBox input{
    width:220px;
}

.btn{
    background-color:#0079c1;
    color:white;
    border:none;
    padding:10px 15px;
    font-size:14px;
    cursor:pointer;
    border-radius:4px;
    font-weight:bold;
}

.btn:hover{
    background-color:#005e96;
}

select,input{
    padding:8px;
    width:100%;
    box-sizing:border-box;
}

#coords{
    font-size:12px;
    background:white;
    padding:8px;
    border:1px solid #ccc;
}

</style>
</head>

<body>

<div id="sidebar">

<h3>Portal Geo-Mini</h3>

<p>
Streaming layer WMS publik dan download data GeoJSON.
</p>

<label>Pilih Layer</label>

<select id="layerSelect">
<option value="topp:states">USA States</option>
<option value="topp:tasmania_roads">Tasmania Roads</option>
<option value="topp:tasmania_water_bodies">Tasmania Water Bodies</option>
</select>

<button class="btn" onclick="loadLayer()">
Tampilkan Layer
</button>

<button class="btn" id="download-btn">
Unduh Data (GeoJSON)
</button>

<div id="coords">
Lat: 0 | Lon: 0
</div>

</div>

<div id="map-container">

<div id="searchBox">

<input
type="text"
id="searchText"
placeholder="Cari lokasi...">

<button
class="btn"
onclick="searchLocation()">
Cari
</button>

</div>

<div id="map"></div>

</div>

https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js

<script>

const map = L.map('map').setView([20,-95],4);

L.tileLayer(
'https://tile.openstreetmap.org/{z}/{x}/{y}.png',
{
attribution:'© OpenStreetMap'
}
).addTo(map);

let currentWMS = null;

function loadLayer(){

    const layerName =
    document.getElementById(
    'layerSelect'
    ).value;

    if(currentWMS){
        map.removeLayer(currentWMS);
    }

    currentWMS = L.tileLayer.wms(
        'https://ahocevar.com/geoserver/wms',
        {
            layers:layerName,
            format:'image/png',
            transparent:true
        }
    );

    currentWMS.addTo(map);

}

loadLayer();

map.on('mousemove',function(e){

document.getElementById('coords').innerHTML =
'Lat : ' +
e.latlng.lat.toFixed(6) +
' | Lon : ' +
e.latlng.lng.toFixed(6);

});

async function searchLocation(){

const keyword =
document.getElementById(
'searchText'
).value;

if(!keyword) return;

const response =
await fetch(
'https://nominatim.openstreetmap.org/search?format=json&q=' +
encodeURIComponent(keyword)
);

const result =
await response.json();

if(result.length){

map.setView([
parseFloat(result[0].lat),
parseFloat(result[0].lon)
],12);

}

}

document.getElementById(
'download-btn'
).addEventListener(
'click',
function(){

const geojson = {
"type":"FeatureCollection",
"features":[
{
"type":"Feature",
"properties":{
"name":"Soroako"
},
"geometry":{
"type":"Point",
"coordinates":[121.36,-2.53]
}
}
]
};

const blob = new Blob(
[JSON.stringify(geojson,null,2)],
{
type:'application/json'
}
);

const a =
document.createElement('a');

a.href =
URL.createObjectURL(blob);

a.download =
'sample.geojson';

a.click();

});

</script>

</body>
</html>
