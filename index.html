<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Portal Geo-Mini</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css"/   padding:0;
    display:flex;
    height:100vh;
    font-family:Arial,sans-serif;
}

#sidebar{
    width:320px;
    background:#f4f5f7;
    padding:20px;
    box-shadow:2px 0 5px rgba(0,0,0,.1);
}

#map-container{
    flex:1;
    position:relative;
}

#map{
    width:100%;
    height:100%;
}

.btn{
    width:100%;
    padding:10px;
    margin-top:10px;
    background:#0079c1;
    color:white;
    border:none;
    border-radius:4px;
    cursor:pointer;
}

.btn:hover{
    background:#005e96;
}

select{
    width:100%;
    padding:8px;
}

#coords{
    margin-top:15px;
    font-size:12px;
}

#searchBox{
    position:absolute;
    top:10px;
    right:10px;
    z-index:1000;
    background:white;
    padding:8px;
    border-radius:6px;
    box-shadow:0 0 6px rgba(0,0,0,.3);
}

#searchText{
    width:220px;
}
</style>

</head>
<body>

<div id="sidebar">

<h2>Portal Geo-Mini</h2>

<p>
Streaming layer WMS publik dan download GeoJSON.
</p>

<label>Pilih Layer</label>

<select id="layerSelect">
    <option value="topp:states">USA States</option>
    <option value="topp:tasmania_roads">Tasmania Roads</option>
    <option value="topp:tasmania_water_bodies">Tasmania Water Bodies</option>
</select>

<button class="btn" onclick="loadLayer()">
Tampilkan Layer
</button>

<button class="btn" id="downloadBtn">
Unduh Data (GeoJSON)
</button>

<div id="coords">
Lat : 0 | Lon : 0
</div>

</div>

<div id="map-container">

<div id="searchBox">
<input type="text" id="searchText" placeholder="Cari lokasi">
<button onclick="searchLocation()">Cari</button>
</div>

<div id="map"></div>

</div>

/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

const map = L.map('map').setView([20,-95],4);

L.tileLayer(
'https://tile.openstreetmap.org/{z}/{x}/{y}.png',
{
attribution:'© OpenStreetMap'
}
).addTo(map);

let currentLayer;

function loadLayer(){

const layerName =
document.getElementById('layerSelect').value;

if(currentLayer){
map.removeLayer(currentLayer);
}

currentLayer = L.tileLayer.wms(
'https://ahocevar.com/geoserver/wms',
{
layers:layerName,
transparent:true,
format:'image/png'
}
);

currentLayer.addTo(map);

}

loadLayer();

map.on('mousemove',function(e){

document.getElementById('coords').innerHTML =
'Lat : ' +
e.latlng.lat.toFixed(6) +
' | Lon : ' +
e.latlng.lng.toFixed(6);

});

async function searchLocation(){

const keyword =
document.getElementById('searchText').value;

if(!keyword) return;

const response = await fetch(
'https://nominatim.openstreetmap.org/search?format=json&q=' +
encodeURIComponent(keyword)
);

const data = await response.json();

if(data.length){

map.setView(
[
parseFloat(data[0].lat),
parseFloat(data[0].lon)
],
12
);

}

}

document.getElementById('downloadBtn')
.addEventListener('click',function(){

const geojson={
"type":"FeatureCollection",
"features":[]
};

const blob = new Blob(
[JSON.stringify(geojson,null,2)],
{type:'application/json'}
);

const a=document.createElement('a');

a.href=URL.createObjectURL(blob);
a.download='data.geojson';
a.click();

});

</script>

</body>
</html>
