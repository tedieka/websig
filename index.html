<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>WEBGIS Advanced</title>

https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<link rel="stylesheetajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"/>

<style>

html,body{
margin:0;
height:100%;
font-family:Arial,sans-serif;
}

#map{
height:100%;
width:100%;
}

#sidebar{
position:absolute;
top:10px;
left:10px;
z-index:1000;
width:300px;
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,.3);
max-height:90%;
overflow:auto;
}

#sidebar h3{
margin-top:0;
}

input,
select,
button{
width:100%;
margin-top:5px;
padding:8px;
box-sizing:border-box;
}

button{
background:#0078d7;
color:white;
border:none;
cursor:pointer;
}

button:hover{
background:#005ea6;
}

#coords{
position:absolute;
bottom:10px;
left:10px;
z-index:1000;
background:white;
padding:5px 10px;
border-radius:5px;
font-size:12px;
}

.layer-item{
font-size:13px;
padding:3px;
}

</style>
</head>
<body>

<div id="sidebar">

<h3>WEBGIS Advanced</h3>

<label>Cari Lokasi</label>
<input id="searchText" placeholder="Jakarta">

<button onclick="searchLocation()">
Cari
</button>

<hr>

<label>Pilih Layer WMS</label>

<select id="layerSelect">
<option value="topp:states">USA States</option>
<option value="topp:tasmania_roads">Tasmania Roads</option>
<option value="topp:tasmania_water_bodies">Tasmania Water</option>
</select>

<button onclick="addWMSLayer()">
Tambah Layer
</button>

<hr>

<label>Upload GeoJSON</label>
<input type="file" id="geojsonFile">

<button onclick="downloadGeoJSON()">
Download GeoJSON
</button>

<hr>

<b>Layer Aktif</b>

<div id="layerList"></div>

</div>

<div id="coords">
Lat: 0 | Lon: 0
</div>

<div id="map"></div>

/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="https://cdnjs.cloudflare>

<script>

const map = L.map('map').setView([-2.5,121.3],5);

const osm = L.tileLayer(
'https://tile.openstreetmap.org/{z}/{x}/{y}.png',
{
attribution:'OpenStreetMap'
}
);

const topo = L.tileLayer(
'https://tile.opentopomap.org/{z}/{x}/{y}.png'
);

const satellite = L.tileLayer(
'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'
);

osm.addTo(map);

L.control.layers(
{
'OpenStreetMap':osm,
'Topo':topo,
'Satellite':satellite
}
).addTo(map);

L.control.scale().addTo(map);

map.on("mousemove",function(e){

document.getElementById("coords").innerHTML=
"Lat : "+e.latlng.lat.toFixed(6)+
" | Lon : "+e.latlng.lng.toFixed(6);

});

let layerCounter=0;
let activeLayers={};

function addWMSLayer(){

const layerName =
document.getElementById("layerSelect").value;

const layer =
L.tileLayer.wms(
'https://ahocevar.com/geoserver/wms',
{
layers:layerName,
transparent:true,
format:'image/png'
}
).addTo(map);

const id='layer'+layerCounter++;

activeLayers[id]=layer;

const div=document.createElement('div');

div.className='layer-item';

div.innerHTML=
'<input type="checkbox" checked onchange="toggleLayer(\''+
id+
'\',this.checked)"> '+layerName;

document.getElementById('layerList')
.appendChild(div);

}

function toggleLayer(id,status){

if(status){
map.addLayer(activeLayers[id]);
}
else{
map.removeLayer(activeLayers[id]);
}

}

let uploadedGeoJSON=null;

document
.getElementById("geojsonFile")
.addEventListener("change",function(e){

const file=e.target.files[0];

const reader=new FileReader();

reader.onload=function(evt){

const data =
JSON.parse(evt.target.result);

if(uploadedGeoJSON){
map.removeLayer(uploadedGeoJSON);
}

uploadedGeoJSON =
L.geoJSON(data).addTo(map);

map.fitBounds(
uploadedGeoJSON.getBounds()
);

};

reader.readAsText(file);

});

function downloadGeoJSON(){

const sample={

"type":"FeatureCollection",

"features":[
{
"type":"Feature",
"properties":{
"name":"Soroako"
},
"geometry":{
"type":"Point",
"coordinates":[121.36,-2.53]
}
}
]

};

const blob =
new Blob(
[JSON.stringify(sample,null,2)],
{
type:"application/json"
}
);

const a =
document.createElement("a");

a.href =
URL.createObjectURL(blob);

a.download =
"data.geojson";

a.click();

}

async function searchLocation(){

const text =
document.getElementById("searchText").value;

const url =
"https://nominatim.openstreetmap.org/search?format=json&q="
+
encodeURIComponent(text);

const result =
await fetch(url)
.then(r=>r.json());

if(result.length){

map.setView(
[
parseFloat(result[0].lat),
parseFloat(result[0].lon)
],
12
);

}

}

const drawnItems =
new L.FeatureGroup();

map.addLayer(drawnItems);

const drawControl =
new L.Control.Draw({

edit:{
featureGroup:drawnItems
}

});

map.addControl(drawControl);

map.on(
L.Draw.Event.CREATED,
function(e){

drawnItems.addLayer(
e.layer
);

}
);

</script>

</body>
</html>
