<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Tes Leaflet</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" />

<style>
html,body,#map{
height:100%;
margin:0;
}
</style>

</head>

<body>

<div id="map"></div>

<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css"></script>

<script>

var map = L.map('map').setView([-2.5,121.3],5);

L.tileLayer(
'https://tile.openstreetmap.org/{z}/{x}/{y}.png',
{
attribution:'© OpenStreetMap'
}
).addTo(map);

</script>

</body>
</html>
