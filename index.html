<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>WEBGIS WMS Viewer</title>

<link rel="kg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

html,body{
height:100%;
margin:0;
font-family:Arial,Helvetica,sans-serif;
}

#map{
height:100%;
width:100%;
}

#panel{
position:absolute;
top:10px;
left:10px;
z-index:1000;
background:white;
padding:12px;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.3);
width:280px;
}

#panel h3{
margin-top:0;
}

select,button{
width:100%;
margin-top:5px;
padding:8px;
}

#coord{
position:absolute;
bottom:10px;
left:10px;
z-index:1000;
background:white;
padding:6px;
border-radius:5px;
font-size:12px;
}

</style>
</head>
<body>

<div id="panel">

<h3>WEBGIS WMS</h3>

<label>Pilih Layer WMS</label>

<select id="layerSelect">

<option value="topp:states">
USA States
</option>

<option value="topp:tasmania_roads">
Tasmania Roads
</option>

<option value="topp:tasmania_water_bodies">
Tasmania Water
</option>

</select>

<button onclick="loadLayer()">
Tampilkan Layer
</button>

<button onclick="downloadGeoJSON()">
Download GeoJSON
</button>

</div>

<div id="coord">
Lat: 0 | Lon: 0
</div>

<div id="map"></div>

1.9.4/dist/leaflet.js"></script>

<script>

const map = L.map('map').setView([20,-95],4);

L.tileLayer(
'https://tile.openstreetmap.org/{z}/{x}/{y}.png',
{
attribution:'© OpenStreetMap'
}
).addTo(map);

let currentLayer=null;

function loadLayer(){

if(currentLayer){
map.removeLayer(currentLayer);
}

const selected =
document.getElementById(
'layerSelect'
).value;

currentLayer = L.tileLayer.wms(
'https://ahocevar.com/geoserver/wms',
{
layers:selected,
format:'image/png',
transparent:true
}
);

currentLayer.addTo(map);

}

loadLayer();

map.on('mousemove',function(e){

document.getElementById('coord')
.innerHTML =
'Lat : '+
e.latlng.lat.toFixed(6)+
' | Lon : '+
e.latlng.lng.toFixed(6);

});

map.on('click',async function(e){

if(!currentLayer) return;

const point =
map.latLngToContainerPoint(
e.latlng,
map.getZoom()
);

const size = map.getSize();

const bbox =
map.getBounds().toBBoxString();

const layerName =
document.getElementById(
'layerSelect'
).value;

const url =
'https://ahocevar.com/geoserver/wms' +
'?SERVICE=WMS' +
'&VERSION=1.1.1' +
'&REQUEST=GetFeatureInfo' +
'&LAYERS=' + layerName +
'&QUERY_LAYERS=' + layerName +
'&INFO_FORMAT=text/html' +
'&SRS=EPSG:4326' +
'&WIDTH=' + size.x +
'&HEIGHT=' + size.y +
'&X=' + Math.round(point.x) +
'&Y=' + Math.round(point.y) +
'&BBOX=' + bbox;

try{

const response =
await fetch(url);

const html =
await response.text();

L.popup()
.setLatLng(e.latlng)
.setContent(html)
.openOn(map);

}
catch(err){

console.log(err);

}

});

function downloadGeoJSON(){

const geojson = {

"type":"FeatureCollection",

"features":[
{
"type":"Feature",
"properties":{
"name":"Soroako"
},
"geometry":{
"type":"Point",
"coordinates":[121.36,-2.53]
}
}
]

};

const blob =
new Blob(
[JSON.stringify(geojson,null,2)],
{
type:"application/json"
}
);

const a =
document.createElement("a");

a.href =
URL.createObjectURL(blob);

a.download =
"soroako.geojson";

a.click();

}

</script>

</body>
</html>
