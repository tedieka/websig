<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Portal Geo-Mini</title>

<link rel="stylesheet" hrefleaflet.css"/>

<style>

body{
margin:0;
padding:0;
display:flex;
height:100vh;
font-family:Arial, sans-serif;
}

#sidebar{
width:320px;
background:#f4f5f7;
padding:20px;
box-shadow:2px 0 5px rgba(0,0,0,0.1);
z-index:1000;
overflow-y:auto;
}

#map{
flex:1;
height:100%;
}

.btn{
background:#0079c1;
color:white;
border:none;
padding:10px;
cursor:pointer;
border-radius:4px;
width:100%;
margin-top:5px;
}

.btn:hover{
background:#005e96;
}

.info-box{
background:white;
padding:10px;
border-radius:4px;
border:1px solid #ccc;
margin-bottom:10px;
}

select,
input{
width:100%;
padding:8px;
box-sizing:border-box;
margin-bottom:10px;
}

#coord{
font-size:12px;
margin-top:10px;
}

.layer-item{
font-size:13px;
margin-top:3px;
}

</style>
</head>
<body>

<div id="sidebar">

<h2>Portal Geo-Mini</h2>

<p>
WEBGIS sederhana menggunakan Leaflet dan WMS publik.
</p>

<div class="info-box">
<b>Status</b>
<div id="layer-status">
Siap
</div>
</div>

<h4>Cari Lokasi</h4>

<input
id="searchText"
placeholder="Jakarta">

<button
class="btn"
onclick="searchLocation()">
Cari Lokasi
</button>

<hr>

<h4>Pilih Layer WMS</h4>

<select id="layerSelect">

<option value="topp:states">
USA States
</option>

<option value="topp:tasmania_roads">
Tasmania Roads
</option>

<option value="topp:tasmania_water_bodies">
Tasmania Water Bodies
</option>

</select>

<button
class="btn"
onclick="addWMSLayer()">

Tambah Layer

</button>

<hr>

<h4>Upload GeoJSON</h4>

<input
type="file"
id="geojsonFile">

<button
class="btn"
onclick="downloadSample()">

Unduh Contoh GeoJSON

</button>

<hr>

<h4>Layer Aktif</h4>

<div id="layerList"></div>

<div id="coord">
Lat: 0 | Lon: 0
</div>

</div>

<div id="map"></div>

<script src="https://t.js"></script>

<script>

const map =
L.map('map')
.setView([-2.5,121.3],5);

L.tileLayer(
'https://tile.openstreetmap.org/{z}/{x}/{y}.png',
{
attribution:'© OpenStreetMap'
}
).addTo(map);

let activeLayers = {};
let layerCounter = 0;
let uploadedLayer = null;

map.on('mousemove',function(e){

document.getElementById('coord').innerHTML =
'Lat : ' +
e.latlng.lat.toFixed(6) +
' | Lon : ' +
e.latlng.lng.toFixed(6);

});

function addWMSLayer(){

const layerName =
document.getElementById(
'layerSelect'
).value;

const layer =
L.tileLayer.wms(
'https://ahocevar.com/geoserver/wms',
{
layers:layerName,
format:'image/png',
transparent:true
}
).addTo(map);

const id =
'layer_' + layerCounter++;

activeLayers[id] = layer;

const div =
document.createElement('div');

div.className='layer-item';

div.innerHTML =
`<input type="checkbox"
checked
onchange="toggleLayer('${id}',this.checked)">
${layerName}`;

document
.getElementById('layerList')
.appendChild(div);

document
.getElementById('layer-status')
.innerHTML =
'Layer berhasil ditambahkan';

}

function toggleLayer(id,status){

if(status){
map.addLayer(activeLayers[id]);
}else{
map.removeLayer(activeLayers[id]);
}

}

document
.getElementById('geojsonFile')
.addEventListener(
'change',
function(e){

const file =
e.target.files[0];

if(!file) return;

const reader =
new FileReader();

reader.onload =
function(evt){

const geojson =
JSON.parse(
evt.target.result
);

if(uploadedLayer){
map.removeLayer(
uploadedLayer
);
}

uploadedLayer =
L.geoJSON(
geojson
).addTo(map);

map.fitBounds(
uploadedLayer.getBounds()
);

document
.getElementById('layer-status')
.innerHTML =
'GeoJSON berhasil dimuat';

};

reader.readAsText(file);

});

function downloadSample(){

const geojson = {
"type":"FeatureCollection",
"features":[
{
"type":"Feature",
"properties":{
"name":"Soroako"
},
"geometry":{
"type":"Point",
"coordinates":[121.36,-2.53]
}
}
]
};

const blob =
new Blob(
[
JSON.stringify(
geojson,
null,
2
)
],
{
type:"application/json"
}
);

const a =
document.createElement("a");

a.href =
URL.createObjectURL(blob);

a.download =
"contoh.geojson";

a.click();

}

async function searchLocation(){

const text =
document.getElementById(
'searchText'
).value;

if(!text) return;

const url =
'https://nominatim.openstreetmap.org/search?format=json&q=' +
encodeURIComponent(text);

const result =
await fetch(url)
.then(r=>r.json());

if(result.length){

map.setView(
[
parseFloat(result[0].lat),
parseFloat(result[0].lon)
],
12
);

}

}

</script>

</body>
</html>
